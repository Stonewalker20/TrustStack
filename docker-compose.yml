services:
  mongo:
    image: mongo:7
    container_name: truststack-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - truststack_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

volumes:
  truststack_mongo_data:
